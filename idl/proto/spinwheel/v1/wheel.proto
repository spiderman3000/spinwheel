syntax = "proto3";

package spinwheel.v1;

import "google/protobuf/timestamp.proto";

option go_package = "spinwheel/backend/gen/proto/spinwheel/v1;spinwheelv1";

enum Theme {
  THEME_UNSPECIFIED = 0;
  THEME_LIGHT = 1;
  THEME_DARK = 2;
}

message Wheel {
  string id = 1;
  string name = 2;
  string user_id = 3;
  repeated WheelItem items = 4;
  Theme theme = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message WheelItem {
  string id = 1;
  string option = 2;  // Renamed from 'text' to match docs
  string wheel_id = 3;
  double weight = 4;
  string color = 5;
  google.protobuf.Timestamp created_at = 6;
}
