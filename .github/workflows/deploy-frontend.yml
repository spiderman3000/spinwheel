name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main  # Changed from 'main' - make sure this matches your default branch
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'  # Updated extension
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Updated to Node 20 LTS
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      # Vite must use base /<repo>/ on GitHub Pages project sites, or asset URLs break (blank page).
      # User/org site repo <owner>.github.io is served at domain root — base stays "/".
      - name: Set Vite base path for GitHub Pages
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${REPO}/" >> "$GITHUB_ENV"
          fi
      
      - name: Build
        working-directory: ./frontend
        env:
          NODE_ENV: production
          # Remove VITE_API_URL if using GitHub Pages with no backend
          # Or set it to your deployed backend URL
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://your-backend.com/v1' }}
        run: npm run build
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4