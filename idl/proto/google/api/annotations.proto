// # Path Template Syntax
//
//     Template = "/" Segments [ Verb ] ;
//     Segments = Segment { "/" Segment } ;
//     Segment  = "*" | "**" | LITERAL | Variable ;
//     Variable = "{" FieldPath [ "=" Segments ] "}" ;
//     FieldPath = IDENT { "." IDENT } ;
//     Verb     = ":" LITERAL ;
//
// The syntax `*` matches a single URL path segment. The syntax `**` matches
// zero or more URL path segments, which must be the last part of the URL path
// except the optional verb.
//
// The syntax `Variable` matches part of the URL path. A `Variable` contains
// a `FieldPath`, which is a sequence of dot-separated field names that
// describes a path to a field in the request message.
//
// E.g. `message M { string f = 1; }` and `path: "/messages/{f}"`.
//
// A `Variable` can also contain an optional `Segments` part to specify the
// sub-path matching pattern.
//
// E.g. `message M { string f = 1; }` and `path: "/messages/{f=**}"`.
//
// E.g. `message M { string f = 1; }` and `path: "/messages/{f=messages/*}"`.
//
// The syntax `LITERAL` matches literal text in the URL path. The syntax
// `Verb` matches the verb part of the URL path, if any.
//
// # Body
//
// The `body` field specifies the mapping of the request message to the HTTP
// request body. It can be `*` or a comma-separated list of field names.
//
// If `body` is `*`, it means the whole request message is used as the HTTP
// request body. Any remaining request fields will become HTTP query
// parameters.
//
// If `body` is empty, it means the HTTP request body is empty. All remaining
// request fields will become HTTP query parameters.
//
// If `body` is a comma-separated list of field names, it means the specified
// fields are used as the HTTP request body. Any remaining request fields
// will become HTTP query parameters.
//
// # Additional Bindings
//
// The `additional_bindings` field specifies a list of additional HTTP
// bindings for the same RPC method. This is useful for supporting legacy
// REST APIs that have multiple URL paths for the same RPC method.
//
// # Semantics
//
// The semantics of the `HttpRule` is as follows:
//
// - The `pattern` is matched against the URL path.
// - The `body` is used to map the request message to the HTTP request body.
// - The remaining fields of the request message are mapped to the URL query
//   parameters.
// - The response message is mapped to the HTTP response body.
//
// The matching of the URL path is done as follows:
//
// - The URL path is split into segments.
// - The `pattern` is also split into segments.
// - The segments are matched one by one.
// - If a segment in the `pattern` is a `LITERAL`, it must match the
//   corresponding segment in the URL path.
// - If a segment in the `pattern` is a `*`, it matches any single segment in
//   the URL path.
// - If a segment in the `pattern` is a `**`, it matches zero or more
//   segments in the URL path. It must be the last segment in the `pattern`
//   except the optional verb.
// - If a segment in the `pattern` is a `Variable`, it matches a segment in
//   the URL path. The matched segment is parsed and stored in the
//   corresponding field of the request message.
message HttpRule {
  // Selects a method to which this rule applies.
  //
  // Refer to [selector][google.api.DocumentationRule.selector] for syntax details.
  string selector = 1;

  // The name of the request field whose value is mapped to the HTTP body, or
  // `*` for mapping all fields not captured by the path pattern to the HTTP
  // body.
  //
  // NOTE: the referred field must be present at the top-level of the request
  // message type.
  string body = 7;

  // Optional. The name of the response field whose value is mapped to the HTTP
  // response body. When omitted, the entire response message will be used
  // as the HTTP response body.
  //
  // NOTE: the referred field must be present at the top-level of the response
  // message type.
  string response_body = 12;

  // Additional HTTP bindings for the selector. Nested bindings must
  // not contain an `additional_bindings` field themselves (that is,
  // the nesting may only be one level deep).
  repeated HttpRule additional_bindings = 11;

  // Determines the URL pattern is matched by this rules. This pattern can be
  // used with any of the {get|put|post|delete|patch} methods. A custom method
  // can be defined using the 'custom' field.
  oneof pattern {
    // Maps to HTTP GET. Used for listing and getting information about
    // resources.
    string get = 2;

    // Maps to HTTP PUT. Used for replacing a resource.
    string put = 3;

    // Maps to HTTP POST. Used for creating a resource or performing an action.
    string post = 4;

    // Maps to HTTP DELETE. Used for deleting a resource.
    string delete = 5;

    // Maps to HTTP PATCH. Used for updating a resource.
    string patch = 6;

    // The custom pattern is used for specifying custom HTTP verbs.
    CustomHttpPattern custom = 8;
  }
}

// A custom pattern is used for defining custom HTTP verbs.
message CustomHttpPattern {
  // The name of this custom HTTP verb.
  string kind = 1;

  // The path template. The syntax is the same as defined in [HttpRule][].
  string path = 2;
}
