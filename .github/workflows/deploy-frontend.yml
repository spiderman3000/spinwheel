name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main  # Changed from 'main' - make sure this matches your default branch
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'  # Updated extension

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Updated to Node 20 LTS
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build
        working-directory: ./frontend
        env:
          # Remove VITE_API_URL if using GitHub Pages with no backend
          # Or set it to your deployed backend URL
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://your-backend.com/v1' }}
        run: npm run build
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4